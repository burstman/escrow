services:
  - type: web
    name: escrow
    runtime: go
    repo: https://github.com/burstman/escrow
    plan: starter
    startCommand: ./app
    healthCheckPath: /
    envVars:
      - key: DEV_MODE
        value: "true"
      - key: PORT
        value: "8080"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: BUSINESS_BANK_NAME
        sync: false
      - key: BUSINESS_RIB
        sync: false
      - key: BUSINESS_ACCOUNT_NAME
        sync: false


